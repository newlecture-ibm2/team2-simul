spring:
  application:
    name: simul-backend
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8080

# Google Vision API 인증경로는 환경변수 GOOGLE_APPLICATION_CREDENTIALS로 설정
# 예시: set GOOGLE_APPLICATION_CREDENTIALS=C:\secrets\google-vision-key.json

jwt:
  secret: c2ltdWwtc2VjcmV0LWtleS1zaW11bC1zZWNyZXQta2V5LXNpbXVsLXNlY3JldC1rZXktc2ltdWwtc2VjcmV0LWtleQ== # example base64 encoded secret >= 256 bits
  access-token-validity-in-seconds: 3600
  refresh-token-validity-in-seconds: 1209600

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
